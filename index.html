<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="yandex-verification" content="93d10a9bf895cec0">
  
  <title>Minecraft versions: Скачать Java и Bedrock все версии | Бесплатно</title>
  <meta name="description" content="Скачивай любую версию Minecraft Java и Bedrock: 1.16.5, 1.20.6, 1.21.5. Подробные описания, скриншоты, гайды по установке. Быстро и бесплатно.">
  <meta name="keywords" content="скачать майнкрафт, minecraft версии, minecraft java скачать, minecraft 1.16.5, minecraft bedrock">
  <link rel="canonical" href="https://davlolpop-lang.github.io/minecraft-site/">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0f1a, #0d1525);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin: 30px 0 10px; font-size: 2.5rem; }
    .sub { text-align: center; color: #aaa; margin-bottom: 40px; }
    .mode-switch {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .mode-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0a0f1a;
    }
    .versions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.15);
    }
    .version-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .version-type { color: #6ee7b7; margin-bottom: 20px; }
    .download-btn {
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0a0f1a;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 40px;
      display: inline-block;
    }
    .footer {
      text-align: center;
      margin-top: 50px;
      color: #888;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🗃️ Minecraft Versions</h1>
  <div class="sub">Файлы лежат прямо в репозитории — скачивание напрямую с GitHub</div>

  <div class="mode-switch">
    <button class="mode-btn active" data-mode="java">💻 Java Edition</button>
    <button class="mode-btn" data-mode="bedrock">📱 Bedrock (APK)</button>
  </div>

  <div id="versionsContainer" class="versions-grid"></div>
  <div class="footer">
    🔹 Файлы находятся в корне репозитория GitHub<br>
    🔹 Имена файлов: <code>java_1.16.5.zip</code>, <code>bedrock_1.21.20.apk</code> и т.д.
  </div>
</div>

<script>
  // ==================== НАСТРОЙКИ (меняй здесь) ====================
  // Список версий для отображения
  const JAVA_VERSIONS = ["1.16.5", "1.17.1", "1.18.2", "1.19.4", "1.20.6", "1.21.5"];
  const BEDROCK_VERSIONS = ["1.21.20", "1.21.40"];

  // Функция возвращает ссылку на файл в корне репозитория
  function getFileUrl(version, type) {
    if (type === "java") return `java_${version}.zip`;
    else return `bedrock_${version}.apk`;
  }

  // ==================== ЛОГИКА ОТОБРАЖЕНИЯ ====================
  let currentMode = "java";
  const container = document.getElementById("versionsContainer");
  const btns = document.querySelectorAll(".mode-btn");

  function render() {
    const isJava = currentMode === "java";
    const versions = isJava ? JAVA_VERSIONS : BEDROCK_VERSIONS;
    const typeLabel = isJava ? "Java Edition" : "Bedrock / PE";
    const fileExt = isJava ? ".zip" : ".apk";

    if (versions.length === 0) {
      container.innerHTML = `<div style="grid-column:1/-1; text-align:center;">Нет версий для отображения</div>`;
      return;
    }

    let html = "";
    for (let ver of versions) {
      const fileUrl = getFileUrl(ver, isJava ? "java" : "bedrock");
      html += `
        <div class="card">
          <div class="version-name">Minecraft ${ver}</div>
          <div class="version-type">${typeLabel}</div>
          <a href="${fileUrl}" class="download-btn" download>⬇ Скачать ${fileExt}</a>
        </div>
      `;
    }
    container.innerHTML = html;
  }

  btns.forEach(btn => {
    btn.addEventListener("click", () => {
      btns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentMode = btn.getAttribute("data-mode");
      render();
    });
  });

  render();
</script>
</body>
</html>
